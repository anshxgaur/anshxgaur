name: Daily AI Insight

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/daily-ai-quote.yml"

permissions:
  contents: write

jobs:
  update-quote:
    name: Refresh README insight
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update quote block
        run: |
          python3 <<'PY'
          from datetime import date
          from pathlib import Path
          import urllib.parse

          quotes = [
              "Data is the new oil - pipelines are the refineries.",
              "Automation is the present accelerated.",
              "Every dataset hides a story - engineering reveals it.",
              "Think in systems, act in data.",
              "AI does not replace engineers - it upgrades them.",
              "From chaos to insight - one pipeline at a time.",
              "Smart systems are engineered through iteration.",
              "Data speaks only when engineered to.",
              "A clean pipeline is a competitive advantage.",
              "Build models that explain, not just predict.",
              "Good ML starts before model.fit.",
              "Retrieval turns language models into useful systems.",
              "Reliable AI is measured, monitored, and improved.",
              "Ship small systems, learn fast, compound quietly.",
          ]

          readme = next((path for path in Path(".").iterdir() if path.name.lower().startswith("readme")), Path("README.md"))
          if not readme.exists():
              readme.write_text("# Ansh Gaur\n\n", encoding="utf-8")

          quote = quotes[date.today().toordinal() % len(quotes)]
          encoded = urllib.parse.quote_plus(quote)
          image = (
              '<p align="center">\n'
              '  <img src="https://readme-typing-svg.herokuapp.com'
              '?font=JetBrains+Mono&weight=700&size=24&duration=4200&pause=900'
              '&color=00D9FF&center=true&vCenter=true&width=900&lines='
              f'{encoded}" alt="Daily AI insight" />\n'
              "</p>"
          )

          start = "<!--QUOTE-START-->"
          end = "<!--QUOTE-END-->"
          content = readme.read_text(encoding="utf-8")

          if start in content and end in content:
              before, rest = content.split(start, 1)
              _, after = rest.split(end, 1)
              updated = f"{before}{start}\n{image}\n{end}{after}"
          else:
              block = f"\n\n## Daily AI Insight\n\n{start}\n{image}\n{end}\n"
              updated = content.rstrip() + block + "\n"

          readme.write_text(updated, encoding="utf-8")
          print(f"Updated {readme} with: {quote}")
          PY

      - name: Commit and push README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TARGET=$(ls -1 | grep -i '^readme' | head -n1 || true)
          if [ -n "$TARGET" ] && ! git diff --quiet -- "$TARGET"; then
            git add "$TARGET"
            git commit -m "Update daily AI insight"
            git push
          else
            echo "No README changes to commit."
          fi
